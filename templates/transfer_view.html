{% extends "base.html" %}

{% block title %}Transfer #{{ initial_data.pending_transfer.id }} - Ko'rish{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/transfer_v2.css') }}">
{% endblock %}

{% block content %}
<div class="tv-wrap">
    <a href="/transfer" class="tv-back-link">← Transferlar ro'yxati</a>
    <div id="tvRoot"></div>
</div>

<script>
const INITIAL_DATA = {{ initial_data|tojson }};

function fmtNum(n) {
    const num = Number(n || 0);
    return num.toLocaleString('uz-UZ', { maximumFractionDigits: 2 });
}
function fmtDate(s) {
    if (!s) return '—';
    try { return new Date(s).toLocaleString('uz-UZ'); } catch { return s; }
}
function getStatusBadge(status) {
    const map = {
        draft:      ['draft',      '✏️ Qoralama'],
        sent:       ['sent',       '📤 Yuborildi'],
        picking:    ['picking',    '⚙️ Yig\'ilmoqda'],
        dispatched: ['dispatched', '🚚 Yo\'lda'],
        completed:  ['completed',  '✅ Yakunlandi'],
    };
    const [cls, label] = map[status] || map.draft;
    return `<span class="tv-status tv-status-${cls}">${label}</span>`;
}

function render() {
    const p = INITIAL_DATA.pending_transfer;
    const items = p.items || [];
    const receivedMap = {};
    (p.received_items || []).forEach(ri => { receivedMap[ri.product_id] = ri.received_qty; });

    const rows = items.map(it => {
        const pid = it.id || it.product_id;
        const sent = Number(it.quantity || 0);
        const received = receivedMap[pid] !== undefined ? Number(receivedMap[pid]) : sent;
        const diff = received - sent;
        const diffCls = diff < 0 ? 'tv-diff-less' : 'tv-diff-ok';
        const diffTxt = diff === 0 ? '—' : (diff > 0 ? `+${fmtNum(diff)}` : `${fmtNum(diff)}`);
        return `<tr>
            <td>${it.name || ('#'+pid)}</td>
            <td class="num">${fmtNum(sent)}</td>
            <td class="num">${fmtNum(received)}</td>
            <td class="num"><span class="${diffCls}">${diffTxt}</span></td>
        </tr>`;
    }).join('');

    document.getElementById('tvRoot').innerHTML = `
        <div class="tv-card">
            <h2 class="tv-title">Transfer #${p.id} ${getStatusBadge(p.status)}</h2>
            <div class="tv-row">
                <div><div class="tv-label">Qayerdan</div><div class="tv-value">${p.from_location || '—'}</div></div>
                <div><div class="tv-label">Qayerga</div><div class="tv-value">${p.to_location || '—'}</div></div>
            </div>
            <div class="tv-row">
                <div><div class="tv-label">Yaratdi</div><div class="tv-value">${p.user_name || '—'}</div></div>
                <div><div class="tv-label">Qabul qilingan vaqt</div><div class="tv-value">${fmtDate(p.received_at)}</div></div>
            </div>
            ${p.received_note ? `<div class="tv-note-box"><b>Izoh:</b> ${p.received_note}</div>` : ''}
        </div>

        <div class="tv-card">
            <h3 class="tv-title" style="font-size:16px;">Mahsulotlar</h3>
            <table class="tv-table">
                <thead><tr>
                    <th>Mahsulot</th>
                    <th class="num">Jo'natilgan</th>
                    <th class="num">Qabul qilingan</th>
                    <th class="num">Farq</th>
                </tr></thead>
                <tbody>${rows || '<tr><td colspan="4" style="text-align:center;color:#999;">Mahsulot yo\'q</td></tr>'}</tbody>
            </table>
        </div>

        <div class="tv-actions">
            <a href="/transfer" class="tv-btn tv-btn-secondary">← Orqaga</a>
        </div>
    `;
}
render();
</script>
{% endblock %}
